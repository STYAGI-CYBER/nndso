<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Tracker</title>
    <!-- Load Scripts First -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #0b0f1a; color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .card { background: #161b2a; border: 1px solid #2d3748; border-radius: 16px; padding: 20px; }
        input { background: #1f2937; border: 1px solid #374151; color: white; padding: 8px; border-radius: 8px; width: 100%; }
    </style>
</head>
<body class="p-4 max-w-5xl mx-auto pb-20">

    <div class="flex justify-between items-center mb-8 bg-[#161b2a] p-4 rounded-2xl border border-slate-800">
        <button onclick="changeDate(-1)" class="px-4 py-2 bg-slate-800 rounded">←</button>
        <h1 id="displayDate" class="font-black uppercase">Loading...</h1>
        <button onclick="changeDate(1)" class="px-4 py-2 bg-slate-800 rounded">→</button>
    </div>

    <div class="grid grid-cols-3 gap-3 mb-8 text-center">
        <div class="card"><p class="text-xs text-slate-500 mb-1">EATEN</p><p id="statEaten" class="text-2xl font-black text-blue-500">0</p></div>
        <div class="card border-b-2 border-b-green-500"><p class="text-xs text-slate-500 mb-1">REMAINING</p><p id="statRemaining" class="text-2xl font-black text-green-400">0</p></div>
        <div class="card"><p class="text-xs text-slate-500 mb-1">GOAL</p><input id="goalInput" type="number" class="text-center bg-transparent border-none p-0 text-xl font-bold" onchange="updateGoal(this.value)"></div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="card">
            <div class="flex justify-between mb-6">
                <h2 class="font-black italic uppercase">Meals</h2>
                <button onclick="addMeal()" class="bg-blue-600 px-4 py-1 rounded-lg text-sm font-bold text-white uppercase tracking-tighter hover:bg-blue-500">Add Meal</button>
            </div>
            <div id="mealList" class="space-y-3"></div>
        </div>
        <div class="card flex items-center justify-center min-h-[300px]">
            <canvas id="donutChart"></canvas>
        </div>
    </div>

    <script>
        const S_URL = 'https://lmvssagvffdtqeconreh.supabase.co';
        const S_KEY = 'sb_publishable_xylffMVzOWUZYSgo_xbPJw_g9-jvAhk';
        let supabase;
        let donutChart;
        let currentDate = new Date().toISOString().split('T')[0];
        let dailyGoal = 2500;

        // Initialize App
        async function initApp() {
            console.log("Initializing App...");
            try {
                supabase = window.supabase.createClient(S_URL, S_KEY);
                await fetchSettings();
                await loadData();
            } catch (e) {
                console.error("Critical Init Error:", e);
                alert("Failed to connect to Database. Check Console.");
            }
        }

        async function fetchSettings() {
            const { data } = await supabase.from('settings').select('*').single();
            if (data) {
                dailyGoal = data.daily_goal;
                document.getElementById('goalInput').value = dailyGoal;
            }
        }

        async function loadData() {
            const { data: meals } = await supabase.from('meals').select('*').eq('date', currentDate).order('created_at', { ascending: true });
            renderMeals(meals || []);
            updateUI(meals || []);
        }

        function renderMeals(meals) {
            const list = document.getElementById('mealList');
            if (meals.length === 0) {
                list.innerHTML = '<p class="text-slate-500 italic text-sm">No meals logged.</p>';
                return;
            }
            list.innerHTML = meals.map(m => `
                <div class="flex gap-2 items-center">
                    <button onclick="deleteMeal('${m.id}')" class="text-slate-600 hover:text-red-500">×</button>
                    <input class="flex-1" placeholder="Meal name" value="${m.name || ''}" onchange="updateMeal('${m.id}', 'name', this.value)">
                    <input class="w-24 text-right" type="number" value="${m.calories || 0}" onchange="updateMeal('${m.id}', 'calories', this.value)">
                </div>
            `).join('');
        }

        async function addMeal() {
            console.log("Adding meal...");
            const { error } = await supabase.from('meals').insert({ date: currentDate, name: '', calories: 0 });
            if (error) console.error(error);
            await loadData();
        }

        async function updateMeal(id, field, value) {
            const upd = {}; upd[field] = value;
            await supabase.from('meals').update(upd).eq('id', id);
            await loadData();
        }

        async function deleteMeal(id) {
            if (confirm("Delete meal?")) {
                await supabase.from('meals').delete().eq('id', id);
                await loadData();
            }
        }

        async function updateGoal(val) {
            dailyGoal = parseInt(val) || 2500;
            await supabase.from('settings').upsert({ id: 1, daily_goal: dailyGoal });
            await loadData();
        }

        function updateUI(meals) {
            const total = meals.reduce((sum, m) => sum + (parseInt(m.calories) || 0), 0);
            document.getElementById('statEaten').innerText = total;
            document.getElementById('statRemaining').innerText = dailyGoal - total;
            document.getElementById('displayDate').innerText = currentDate;
            
            const ctx = document.getElementById('donutChart').getContext('2d');
            const data = meals.map(m => m.calories || 0);
            const labels = meals.map(m => m.name || 'Food');
            
            if (total < dailyGoal) {
                data.push(dailyGoal - total);
                labels.push('Remaining');
            }

            if (donutChart) donutChart.destroy();
            donutChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: labels,
                    datasets: [{
                        data: data,
                        backgroundColor: ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981', '#1e293b'],
                        borderWidth: 0
                    }]
                },
                options: { plugins: { legend: { display: false } }, cutout: '80%' }
            });
        }

        function changeDate(days) {
            let d = new Date(currentDate);
            d.setDate(d.getDate() + days);
            currentDate = d.toISOString().split('T')[0];
            loadData();
        }

        // Start when everything is loaded
        window.addEventListener('DOMContentLoaded', initApp);
    </script>
</body>
</html>
